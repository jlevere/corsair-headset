name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main

      - name: Build .app
        run: nix build .#app

      - name: Create DMG
        run: |
          VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//')
          mkdir -p /tmp/dmg-stage
          cp -R result/Applications/Corsair\ Headset.app /tmp/dmg-stage/
          ln -s /Applications /tmp/dmg-stage/Applications
          hdiutil create -volname "Corsair Headset" \
            -srcfolder /tmp/dmg-stage \
            -ov -format UDZO \
            "Corsair-Headset-${VERSION}.dmg"

      - name: Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          files: Corsair-Headset-*.dmg
          generate_release_notes: true
