name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: brew install hidapi pkg-config
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --workspace
